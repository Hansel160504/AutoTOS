services:

  # ── MySQL Database ──────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: autotoss_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE:      ${DB_NAME}
      MYSQL_USER:          ${DB_USER}
      MYSQL_PASSWORD:      ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── AI Model Service (FastAPI + ai_model.py) ────────────────────────────────
  ai:
    build:  
      context: .           # ← root folder so Docker can see ai_packages/
      dockerfile: ai/Dockerfile
    container_name: autotoss_ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models      # mount model weight files here
      - ./uploads:/app/uploads
    environment:
      - MODEL_PATH=${MODEL_PATH}
    # ── Uncomment if your server PC has an NVIDIA GPU ──
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 20s
      retries: 5
      start_period: 60s      # model loading can take a while

  # ── Flask Web Application ───────────────────────────────────────────────────
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: autotoss_web
    restart: unless-stopped
    environment:
      - DATABASE_URL=mysql+mysqlconnector://${DB_USER}:${DB_PASSWORD}@db:3306/${DB_NAME}
      - SECRET_KEY=${SECRET_KEY}
      - AUTO_TOS_MODEL_URL=http://ai:8000
      - AUTO_TOS_MODEL_TIMEOUT=300
      - FLASK_ENV=production
      - FLASK_APP=app.py
    ports:
      - "5000:5000"
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      ai:
        condition: service_healthy

volumes:
  db_data:     # MySQL data persists across restarts and rebuilds